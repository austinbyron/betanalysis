{{ define "base-style" }}
<style>
  /* Always dark — the dashboard has one theme regardless of OS setting. */
  :root {
    color-scheme: dark;
    --page:           #0d0d0d;
    --surface:        #1a1a19;
    --ink:            #ffffff;
    --ink-secondary:  #c3c2b7;
    --ink-muted:      #898781;
    --grid:           #2c2c2a;
    --baseline:       #383835;
    --border:         rgba(255,255,255,0.10);
    --series-1:       #3987e5;
    --series-2:       #199e70;
    --series-3:       #c98500;
    --series-4:       #008300;
    --series-5:       #9085e9;
    --series-6:       #e66767;
    --series-7:       #00a3c4;
    --series-8:       #d55181;
    --series-9:       #d95926;
    --delta-good:     #0ca30c;
    --delta-bad:      #d03b3b;
    --preview:        #c98500;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--ink);
    padding: 24px;
    max-width: 1440px;
    margin: 0 auto;
  }
  /* Leaderboard and bankroll chart share the top row on wide screens */
  .top-grid { display: grid; grid-template-columns: 1fr; gap: 0 20px; align-items: start; }
  @media (min-width: 1100px) {
    .top-grid { grid-template-columns: minmax(420px, 2fr) 3fr; }
    .top-grid > section { margin-bottom: 28px; }
  }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .filter-chip {
    font: inherit; font-size: 12.5px; color: var(--ink-secondary);
    background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
    padding: 4px 12px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .filter-chip.active { color: var(--ink); border-color: var(--ink-muted); font-weight: 600; }
  tr.filtered-out { display: none; }
  tr.dimmed td { opacity: 0.35; }
  th[data-sortable] { cursor: pointer; user-select: none; }
  th[data-sortable]:hover { color: var(--ink); }
  th .sort-arrow { font-size: 10px; margin-left: 3px; }
  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  header h1 { font-size: 20px; font-weight: 650; }
  header .meta { color: var(--ink-muted); font-size: 13px; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .tile .label { font-size: 12px; color: var(--ink-secondary); margin-bottom: 6px; }
  .tile .value { font-size: 24px; font-weight: 650; }
  .tile .sub { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
  .good { color: var(--delta-good); }
  .bad  { color: var(--delta-bad); }
  section { margin-bottom: 28px; }
  h2 { font-size: 15px; font-weight: 650; margin-bottom: 10px; }
  h2 .hint { font-weight: 400; font-size: 12px; color: var(--ink-muted); margin-left: 8px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th { text-align: left; color: var(--ink-secondary); font-weight: 550; padding: 6px 10px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .pick { font-weight: 600; }
  td a {
    color: inherit;
    text-decoration: underline;
    text-decoration-color: var(--baseline);
    text-underline-offset: 3px;
  }
  td a:hover { text-decoration-color: var(--ink); }
  .badge {
    font-size: 11.5px; padding: 2px 8px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--ink-secondary);
    white-space: nowrap;
  }
  .badge-preview { color: var(--preview); border-color: var(--preview); }
  .result-won  { color: var(--delta-good); font-weight: 600; }
  .result-lost { color: var(--delta-bad);  font-weight: 600; }
  .result-void { color: var(--muted);      font-weight: 600; }
  .empty { color: var(--ink-muted); font-size: 13.5px; padding: 6px 0; }
  .chart-wrap { position: relative; }
  .chart-wrap svg { width: 100%; height: auto; display: block; }
  .tooltip {
    position: absolute; pointer-events: none; display: none;
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 8px; font-size: 12px; color: var(--ink);
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    white-space: nowrap; transform: translate(-50%, -130%);
  }
  .legend { display: flex; gap: 16px; padding: 8px 12px 0; font-size: 12px; color: var(--ink-secondary); flex-wrap: wrap; }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .chip { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .strong-consensus td { background: color-mix(in srgb, var(--delta-good) 8%, transparent); }
  .badge-strong { color: var(--delta-good); border: 1px solid var(--delta-good); border-radius: 4px; padding: 0 4px; font-size: 11px; }
  footer { color: var(--ink-muted); font-size: 12px; margin-top: 8px; }
  /* Phones: tables restack into cards — one card per row, labeled values in
     a two-column grid, matchup cells spanning the full width. */
  @media (max-width: 640px) {
    body { padding: 12px; }
    header { margin-bottom: 12px; }
    section { margin-bottom: 18px; }
    .card { padding: 12px; border-radius: 8px; }
    .legend { gap: 10px; }

    .filters {
      flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
      margin-left: -12px; margin-right: -12px; padding: 0 12px 4px;
    }
    .filter-chip { flex: 0 0 auto; padding: 7px 14px; }

    .table-wrap { overflow-x: visible; }
    table, tbody { display: block; width: 100%; }
    thead { display: none; }
    tbody tr {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 16px; padding: 12px 2px;
      border-bottom: 1px solid var(--grid);
    }
    tbody tr:last-child { border-bottom: none; }
    tbody td, tbody td.num {
      display: block; padding: 0; border: none;
      white-space: normal; text-align: left; font-size: 13.5px;
    }
    tbody td::before {
      content: attr(data-th); display: block;
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--ink-muted); margin-bottom: 2px;
    }
    tbody td:not([data-th])::before, tbody td[data-th=""]::before { display: none; }
    tbody td.cell-wide { grid-column: 1 / -1; }
    tbody td:empty { display: none; }
    tr.filtered-out { display: none; }

    /* Chart stays legible: scroll it sideways instead of shrinking it.
       min-width: 0 on the grid items stops the chart's fixed min-width
       from propagating into the track and blowing the layout past the
       viewport — grid items refuse to shrink below content otherwise. */
    .top-grid > section, .top-grid > div { min-width: 0; }
    .chart-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .chart-wrap svg { min-width: 640px; }
  }
</style>
{{ end }}
